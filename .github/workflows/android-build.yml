name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-arm64:
    name: Build arm64-v8a
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Clone llama.cpp at b8368
        run: |
          git clone --depth=1 --branch b8368 \
            https://github.com/ggml-org/llama.cpp.git \
            app/src/main/cpp/llama.cpp

      - name: Download models
        run: |
          mkdir -p app/src/main/assets/models
          curl --fail -L "https://huggingface.co/rufatronics/crop_doctor/resolve/main/crop_doctor.tflite" \
            -o app/src/main/assets/models/crop_doctor.tflite
          if ! curl --fail -L "https://huggingface.co/rufatronics/farmbot-gguf/resolve/main/farmbot-Q4_K_M.gguf" \
            -o app/src/main/assets/models/farmbot-Q4_K_M.gguf; then
            echo "ERROR: farmbot-Q4_K_M.gguf not found. Push the GGUF to rufatronics/farmbot-gguf first."
            exit 1
          fi

      - name: Build arm64 APK
        run: ./gradlew assembleDebug -Pandroid.injected.build.abi=arm64-v8a --stacktrace

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: farmbot-arm64-v8a-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  build-armeabi:
    name: Build armeabi-v7a (best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-armeabi-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Clone llama.cpp at b8368
        run: |
          git clone --depth=1 --branch b8368 \
            https://github.com/ggml-org/llama.cpp.git \
            app/src/main/cpp/llama.cpp

      - name: Download models
        run: |
          mkdir -p app/src/main/assets/models
          curl --fail -L "https://huggingface.co/rufatronics/crop_doctor/resolve/main/crop_doctor.tflite" \
            -o app/src/main/assets/models/crop_doctor.tflite
          curl -L "https://huggingface.co/rufatronics/farmbot-gguf/resolve/main/farmbot-Q4_K_M.gguf" \
            -o app/src/main/assets/models/farmbot-Q4_K_M.gguf || true

      - name: Build armeabi-v7a APK
        run: ./gradlew assembleDebug -Pandroid.injected.build.abi=armeabi-v7a --stacktrace

      - name: Upload armeabi APK
        uses: actions/upload-artifact@v4
        with:
          name: farmbot-armeabi-v7a-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
        continue-on-error: true
